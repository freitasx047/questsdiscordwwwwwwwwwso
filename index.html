<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeQuests</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            position: relative;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #000 0%, #1a1a00 100%);
            z-index: -2;
        }

        .falling-dots {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .dot {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #FFD700;
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .logo i {
            width: 48px;
            height: 48px;
            color: #FFD700;
        }

        .logo h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: rgba(255, 215, 0, 0.6);
            font-size: 14px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.8);
            padding: 8px 20px;
            border-radius: 40px;
            margin-top: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            transition: all 0.3s;
        }

        .status-dot.online {
            background: #FFD700;
            box-shadow: 0 0 10px #FFD700;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: #FFD700;
            transform: translateY(-5px);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .stat-icon i {
            width: 24px;
            height: 24px;
            color: #FFD700;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 8px;
        }

        .stat-label {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-card {
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 40px;
        }

        .login-card label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #FFD700;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .token-input {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            color: #fff;
            font-family: monospace;
            margin-bottom: 16px;
            resize: vertical;
        }

        .token-input:focus {
            outline: none;
            border-color: #FFD700;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        .quests-section {
            margin-bottom: 40px;
        }

        .quests-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .quests-header h2 {
            color: #FFD700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .quest-item {
            background: rgba(0,0,0,0.85);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .quest-item:hover {
            border-color: #FFD700;
            transform: translateY(-3px);
        }

        .quest-image {
            height: 120px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .quest-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        .quest-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            font-size: 10px;
            color: #FFD700;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .quest-content {
            padding: 16px;
        }

        .quest-title {
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quest-title i {
            width: 16px;
            height: 16px;
            color: #FFD700;
        }

        .quest-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
        }

        .quest-reward {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #FFD700;
            padding: 6px 10px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .progress-bar {
            background: rgba(255, 215, 0, 0.15);
            border-radius: 8px;
            height: 4px;
            margin: 12px 0;
        }

        .progress-fill {
            background: #FFD700;
            height: 100%;
            width: 0%;
            border-radius: 8px;
            transition: width 0.3s;
        }

        .quest-btn {
            width: 100%;
            padding: 10px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #FFD700;
            margin-top: 8px;
        }

        .console {
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            overflow: hidden;
        }

        .console-header {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            color: #FFD700;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .console-logs {
            padding: 16px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
        }

        .log-entry {
            padding: 4px 0;
            display: flex;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .log-time {
            color: rgba(255, 215, 0, 0.5);
            min-width: 80px;
        }

        .log-success {
            color: #FFD700;
        }

        .log-error {
            color: #ff6666;
        }

        .log-info {
            color: rgba(255,255,255,0.6);
        }

        .hidden {
            display: none !important;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 215, 0, 0.2);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="falling-dots" id="fallingDots"></div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <i data-lucide="zap"></i>
                <h1>VIBEQUESTS</h1>
            </div>
            <p class="subtitle">Complete suas missões do Discord automaticamente</p>
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Verificando conexão...</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="trophy"></i></div>
                <div class="stat-value" id="statQuests">0</div>
                <div class="stat-label">Missões</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="check-circle"></i></div>
                <div class="stat-value" id="statCompleted">0</div>
                <div class="stat-label">Completadas</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="clock"></i></div>
                <div class="stat-value" id="statPending">0</div>
                <div class="stat-label">Pendentes</div>
            </div>
        </div>

        <div class="login-card" id="loginCard">
            <label><i data-lucide="key"></i> Token do Discord</label>
            <textarea class="token-input" id="token" rows="2" placeholder="Cole seu token aqui..."></textarea>
            <button id="loginBtn"><i data-lucide="log-in"></i> Conectar Conta</button>
        </div>

        <div id="questsSection" class="hidden">
            <div class="quests-header">
                <h2><i data-lucide="trophy"></i> Missões Disponíveis</h2>
                <button id="refreshQuestsBtn" style="width: auto; padding: 8px 20px;"><i data-lucide="refresh-cw"></i> Atualizar</button>
            </div>
            <div class="quests-grid" id="questsList">
                <div style="text-align: center; padding: 40px; color: rgba(255,215,0,0.5);">Carregando missões...</div>
            </div>
            <button id="completeAllBtn" style="margin-top: 20px;"><i data-lucide="zap"></i> COMPLETAR TODAS MISSÕES</button>
        </div>

        <div class="console">
            <div class="console-header">
                <span><i data-lucide="terminal"></i> Console</span>
                <span id="logCounter">0</span>
            </div>
            <div class="console-logs" id="consoleLogs">
                <div class="log-entry"><span class="log-time">───</span><span class="log-info">VibeQuests iniciado</span></div>
            </div>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <script>
        function createFallingDots() {
            const container = document.getElementById('fallingDots');
            for (let i = 0; i < 100; i++) {
                const dot = document.createElement('div');
                dot.classList.add('dot');
                dot.style.width = Math.random() * 3 + 1 + 'px';
                dot.style.height = dot.style.width;
                dot.style.left = Math.random() * 100 + '%';
                dot.style.animationDuration = Math.random() * 8 + 3 + 's';
                dot.style.animationDelay = Math.random() * 10 + 's';
                dot.style.opacity = Math.random() * 0.5 + 0.2;
                container.appendChild(dot);
            }
        }
        createFallingDots();

        let logCount = 0;
        let currentToken = '';
        let currentQuests = [];

        const backendUrl = '/api';

        function addLog(msg, type = 'info') {
            const logsDiv = document.getElementById('consoleLogs');
            const div = document.createElement('div');
            div.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            div.innerHTML = `<span class="log-time">[${time}]</span><span class="log-${type}">${msg}</span>`;
            logsDiv.appendChild(div);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            logCount++;
            document.getElementById('logCounter').innerText = logCount;
        }

        async function checkBackend() {
            try {
                const res = await fetch(`${backendUrl}/health`);
                if (res.ok) {
                    document.getElementById('statusDot').classList.add('online');
                    document.getElementById('statusText').innerText = 'API Online';
                    addLog('✅ API conectada com sucesso!', 'success');
                } else {
                    throw new Error();
                }
            } catch(e) {
                document.getElementById('statusDot').classList.remove('online');
                document.getElementById('statusText').innerText = 'API Offline - Execute node server.js';
                addLog('❌ API offline! Execute: node server.js', 'error');
            }
        }

        async function login() {
            const token = document.getElementById('token').value.trim();
            if (!token) {
                addLog('❌ Por favor, cole seu token do Discord', 'error');
                return;
            }

            addLog('🔐 Autenticando...', 'info');
            document.getElementById('loading').classList.add('active');

            try {
                const res = await fetch(`${backendUrl}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const data = await res.json();

                if (data.success) {
                    currentToken = token;
                    addLog(`✅ Conectado como ${data.user.username}`, 'success');
                    document.getElementById('loginCard').classList.add('hidden');
                    document.getElementById('questsSection').classList.remove('hidden');
                    await loadQuests();
                } else {
                    addLog(`❌ Token inválido: ${data.error}`, 'error');
                }
            } catch(e) {
                addLog(`❌ Erro: ${e.message}`, 'error');
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }

        async function loadQuests() {
            if (!currentToken) return;
            addLog('🔍 Buscando missões...', 'info');

            try {
                const res = await fetch(`${backendUrl}/quests/list`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: currentToken })
                });
                const data = await res.json();

                if (data.success) {
                    currentQuests = data.quests || [];
                    renderQuests(currentQuests);
                    
                    const available = currentQuests.filter(q => !q.completed).length;
                    const completed = currentQuests.filter(q => q.completed).length;
                    document.getElementById('statQuests').innerText = currentQuests.length;
                    document.getElementById('statCompleted').innerText = completed;
                    document.getElementById('statPending').innerText = available;
                    
                    addLog(`📋 ${currentQuests.length} missões encontradas`, 'success');
                }
            } catch(e) {
                addLog(`❌ Erro: ${e.message}`, 'error');
            }
        }

        function renderQuests(quests) {
            const container = document.getElementById('questsList');
            if (!quests.length) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,215,0,0.5);">Nenhuma missão disponível</div>';
                lucide.createIcons();
                return;
            }

            container.innerHTML = '';
            quests.forEach(quest => {
                const percent = quest.target > 0 ? (quest.progress || 0) / quest.target * 100 : 0;
                const imageUrl = `https://picsum.photos/400/150?random=${quest.id}`;
                
                const div = document.createElement('div');
                div.className = 'quest-item';
                div.innerHTML = `
                    <div class="quest-image" style="background-image: url('${imageUrl}');">
                        <div class="quest-overlay">
                            <span class="quest-badge">${quest.type || 'MISSÃO'}</span>
                        </div>
                    </div>
                    <div class="quest-content">
                        <div class="quest-title">
                            <i data-lucide="target"></i> ${quest.name}
                        </div>
                        <div class="quest-desc">${quest.description || 'Complete esta missão para ganhar recompensas'}</div>
                        <div class="quest-reward"><i data-lucide="gift"></i> ${quest.reward || 'Recompensa'}</div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
                        <button class="quest-btn" data-id="${quest.id}"><i data-lucide="check-circle"></i> Completar Missão</button>
                    </div>
                `;
                container.appendChild(div);
            });

            document.querySelectorAll('.quest-btn').forEach(btn => {
                btn.addEventListener('click', () => completeQuest(btn.dataset.id));
            });

            lucide.createIcons();
        }

        async function completeQuest(questId) {
            if (!currentToken) return;
            addLog(`🎯 Completando missão...`, 'info');
            document.getElementById('loading').classList.add('active');

            try {
                const res = await fetch(`${backendUrl}/quests/complete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: currentToken, questId })
                });
                const data = await res.json();

                if (data.logs) {
                    data.logs.forEach(log => addLog(log.message, log.type));
                }

                if (data.success) {
                    addLog(`✨ Missão completada!`, 'success');
                    await loadQuests();
                }
            } catch(e) {
                addLog(`❌ Erro: ${e.message}`, 'error');
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }

        async function completeAllQuests() {
            if (!currentToken) return;
            addLog(`🎯 Completando TODAS as missões...`, 'info');
            document.getElementById('loading').classList.add('active');

            try {
                const res = await fetch(`${backendUrl}/quests/complete-all`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: currentToken })
                });
                const data = await res.json();

                if (data.logs) {
                    data.logs.forEach(log => addLog(log.message, log.type));
                }

                if (data.success) {
                    addLog(`🎉 ${data.completed || 0} missões completadas!`, 'success');
                    await loadQuests();
                }
            } catch(e) {
                addLog(`❌ Erro: ${e.message}`, 'error');
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }

        document.getElementById('loginBtn').onclick = login;
        document.getElementById('refreshQuestsBtn').onclick = loadQuests;
        document.getElementById('completeAllBtn').onclick = completeAllQuests;

        checkBackend();
        setInterval(checkBackend, 30000);
        lucide.createIcons();
    </script>
</body>
</html>
